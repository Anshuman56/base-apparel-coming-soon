<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Base Apparel coming soon page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="left-column">
      <img src="images/logo.svg" alt="logo of our compnay">
      <h1>
    
        We're <span>coming </br>soon</span>
      </h1>
    <p>
      Hello fellow shoppers! We're currently building our new fashion store. 
      Add your email below to stay up-to-date with announcements and our launch deals.
    
    </p>
    <form action="">
  
      <input type="text" name="email" id="email" placeholder="Email Address">
      <button><img src="images/icon-arrow.svg" alt=""></button>
    </form>
    <p class="error">Please provide a valid email</p>
    </div>
    <div class="right-column">
      <img src="images/hero-desktop.jpg" alt="a big photo of a butiful woman">
    </div>

  </div>

  
  
      <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
      Coded by <a href="#">Your Name Here</a>.
    </footer>
    <script src="script.js"></script>
</body>
</html>
